on:
  schedule:
    # Runs every day at 7:00 AM UTC (3 AM ET)
    - cron: "0 7 * * *"
  workflow_dispatch:   # allow manual trigger from Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python setup ────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      # ── 3. Install Python dependencies ────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ── 4. Install Playwright browsers ────────────────────────────────
      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      # ── 5. Run scraper ────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper/fetch.py

      # ── 6. Commit updated data files ──────────────────────────────────
      - name: Commit & push updated records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv dashboard/index.html
          git diff --cached --quiet || git commit -m "chore: auto-update leads $(date -u +%Y-%m-%d)"
          git push

  # ── Deploy dashboard to GitHub Pages ───────────────────────────────────
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main    # use freshly pushed commit

      - name: Upload dashboard/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Deploy dashboard to GitHub Pages ───────────────────────────────────
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main    # use freshly pushed commit

      - name: Upload dashboard/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
